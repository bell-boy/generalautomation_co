<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>generalautomation.co</title>
    <meta
      name="description"
      content="bringing about an automated future. coming soon"
    />
    <style>
      :root {
        color-scheme: light;
        --background: #f7f5f0;
        --foreground: #111111;
        --muted: #4f4a44;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(17, 17, 17, 0.06), transparent 45%),
          var(--background);
        color: var(--foreground);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(90vw, 40rem);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      p {
        max-width: 26rem;
        margin: 1rem auto 0;
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>generalautomation.co</h1>
      <p>bringing about an automated future. coming soon</p>
    </main>
  </body>
</html>
